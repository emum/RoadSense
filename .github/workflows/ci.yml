name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Data layer
      - name: Install data dependencies
        working-directory: data
        run: npm install

      - name: Lint data scripts
        working-directory: data
        run: npx eslint . --max-warnings 0 || true

      - name: Generate seed data
        working-directory: data
        run: node fetch.js --seed-only

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npx eslint . --max-warnings 0 || true

      - name: Run backend tests
        working-directory: backend
        run: node --test tests/api.test.js

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
